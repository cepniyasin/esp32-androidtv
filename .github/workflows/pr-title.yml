name: PR title

# Squash-merging uses the PR title as the commit message on main, and
# semantic-release (release.yml) decides version bumps from that message.
# So the PR title is where Conventional Commits actually gets enforced.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            style
            refactor
            test
            build
            ci
            chore
            revert
