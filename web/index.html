<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Android TV Remote</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0; gap: 1rem;
  }
  #status { font-size: 0.9rem; opacity: 0.7; }
  #pair { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
  #pair.visible { display: flex; }
  #code { font-size: 1.4rem; width: 8ch; text-align: center;
          text-transform: uppercase; letter-spacing: 0.2ch; }
  #pairmsg { font-size: 0.9rem; min-height: 1.2em; }
  #keys { display: none; grid-template-columns: repeat(3, 4.5rem); gap: 0.4rem; }
  #keys.visible { display: grid; }
  button {
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;         /* no iOS long-press callout */
    -webkit-tap-highlight-color: transparent;  /* no Android tap flash */
  }
  #keys button { padding: 0.8rem 0; font-size: 0.9rem; }
  #keys button.nosupport { opacity: 0.35; }
</style>
</head>
<body>
<h1>Android TV Remote</h1>
<p id="status">checking status…</p>
<div id="pair">
  <p>Enter the code shown on the TV:</p>
  <input id="code" maxlength="6" autocomplete="off" spellcheck="false" placeholder="A1B2C3">
  <button id="send">Pair</button>
  <p id="pairmsg"></p>
</div>
<!-- Debug buttons for Phase 6; real layout comes in Phase 7.
     data-hold buttons send START_LONG on press / END_LONG on release
     (required for volume on Chromecast; enables hold-to-repeat). -->
<div id="keys">
  <button data-key="POWER">⏻</button>
  <button data-key="DPAD_UP" data-hold>▲</button>
  <button data-key="BACK">←</button>
  <button data-key="DPAD_LEFT" data-hold>◀</button>
  <button data-key="DPAD_CENTER">OK</button>
  <button data-key="DPAD_RIGHT" data-hold>▶</button>
  <button data-key="HOME">⌂</button>
  <button data-key="DPAD_DOWN" data-hold>▼</button>
  <button data-key="MEDIA_PLAY_PAUSE">⏯</button>
  <button data-key="VOLUME_DOWN" data-hold data-vol>V−</button>
  <button data-key="VOLUME_MUTE" data-vol>🔇</button>
  <button data-key="VOLUME_UP" data-hold data-vol>V+</button>
</div>
<script>
const statusEl = document.getElementById('status');
const pairEl = document.getElementById('pair');
const msgEl = document.getElementById('pairmsg');
let pairing = false;

async function poll() {
  if (pairing || holding) return;
  try {
    const s = await (await fetch('/api/status')).json();
    statusEl.textContent =
      `state: ${s.state} · paired: ${s.paired} · connected: ${s.connected}`;
    pairEl.classList.toggle('visible', s.state === 'wait_code');
    document.getElementById('keys').classList.toggle('visible', s.connected);
    // max == 0: the device delegates volume to the TV over CEC; the
    // protocol cannot change it, so mark those buttons unsupported.
    const volOk = s.volume && s.volume.max > 0;
    document.querySelectorAll('[data-vol]').forEach(v => {
      v.classList.toggle('nosupport', !volOk);
      v.title = volOk ? '' : 'volume not controllable on this device';
    });
  } catch (e) {
    statusEl.textContent = 'esp32 unreachable';
  }
}

document.getElementById('send').onclick = async () => {
  const code = document.getElementById('code').value.trim().toUpperCase();
  if (!/^[0-9A-F]{6}$/.test(code)) {
    msgEl.textContent = 'code must be 6 hex characters';
    return;
  }
  pairing = true;
  msgEl.textContent = 'pairing…';
  try {
    const r = await (await fetch('/api/pair', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code}),
    })).json();
    msgEl.textContent = r.ok ? 'paired!' : (r.error || 'failed');
  } catch (e) {
    msgEl.textContent = 'request failed';
  }
  pairing = false;
  poll();
};

// All key sends go through one promise chain: two parallel fetches can
// arrive out of order (separate connections), and a release overtaking
// its press makes the TV drop the key entirely.
let keyChain = Promise.resolve();
function sendKey(key, direction = 'SHORT') {
  keyChain = keyChain
    .then(() => fetch('/api/key', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key, direction}),
    }))
    .catch(() => {});
  return keyChain;
}

// A press shorter than this is a tap (single SHORT). Only a real hold
// sends the START_LONG/END_LONG pair — rapid long-press pairs make the
// Chromecast close the control connection.
const HOLD_THRESHOLD_MS = 300;
let holding = false;  // suppress status polling during a hold

document.querySelectorAll('#keys button').forEach(b => {
  const key = b.dataset.key;
  if (b.dataset.hold !== undefined) {
    // Tap -> single SHORT. Held past the threshold -> START_LONG, then
    // END_LONG on release (auto-repeat happens on the TV).
    let down = false;
    let longActive = false;
    let holdTimer = null;
    const release = () => {
      if (!down) return;
      down = false;
      holding = false;
      clearTimeout(holdTimer);
      if (longActive) {
        longActive = false;
        sendKey(key, 'END_LONG');
      } else {
        sendKey(key, 'SHORT');
      }
    };
    b.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (down) return;  // debounce double-fire
      // Capture the pointer so finger drift off the button doesn't end
      // the hold (pointerleave would otherwise fire mid-hold).
      b.setPointerCapture(e.pointerId);
      down = true;
      holding = true;
      holdTimer = setTimeout(() => {
        longActive = true;
        sendKey(key, 'START_LONG');
      }, HOLD_THRESHOLD_MS);
    });
    b.addEventListener('pointerup', release);
    b.addEventListener('pointercancel', release);
    b.addEventListener('contextmenu', e => e.preventDefault());
  } else {
    b.onclick = () => sendKey(key);
  }
});

poll();
setInterval(poll, 2000);
</script>
</body>
</html>
