<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Android TV Remote</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0; gap: 1rem;
  }
  #status { font-size: 0.9rem; opacity: 0.7; }
</style>
</head>
<body>
<h1>Android TV Remote</h1>
<p id="status">checking status…</p>
<script>
async function poll() {
  try {
    const r = await fetch('/api/status');
    const s = await r.json();
    document.getElementById('status').textContent =
      `paired: ${s.paired} · connected: ${s.connected}`;
  } catch (e) {
    document.getElementById('status').textContent = 'esp32 unreachable';
  }
}
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
