<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Android TV Remote</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0; gap: 1rem;
  }
  #status { font-size: 0.9rem; opacity: 0.7; }
  #pair { display: none; flex-direction: column; align-items: center; gap: 0.5rem; }
  #pair.visible { display: flex; }
  #code { font-size: 1.4rem; width: 8ch; text-align: center;
          text-transform: uppercase; letter-spacing: 0.2ch; }
  #pairmsg { font-size: 0.9rem; min-height: 1.2em; }
  #keys { display: none; grid-template-columns: repeat(3, 4.5rem); gap: 0.4rem; }
  #keys.visible { display: grid; }
  #keys button { padding: 0.8rem 0; font-size: 0.9rem;
                 touch-action: manipulation; user-select: none;
                 -webkit-user-select: none; }
</style>
</head>
<body>
<h1>Android TV Remote</h1>
<p id="status">checking status…</p>
<div id="pair">
  <p>Enter the code shown on the TV:</p>
  <input id="code" maxlength="6" autocomplete="off" spellcheck="false" placeholder="A1B2C3">
  <button id="send">Pair</button>
  <p id="pairmsg"></p>
</div>
<!-- Debug buttons for Phase 6; real layout comes in Phase 7.
     data-hold buttons send START_LONG on press / END_LONG on release
     (required for volume on Chromecast; enables hold-to-repeat). -->
<div id="keys">
  <button data-key="POWER">⏻</button>
  <button data-key="DPAD_UP" data-hold>▲</button>
  <button data-key="BACK">←</button>
  <button data-key="DPAD_LEFT" data-hold>◀</button>
  <button data-key="DPAD_CENTER">OK</button>
  <button data-key="DPAD_RIGHT" data-hold>▶</button>
  <button data-key="HOME">⌂</button>
  <button data-key="DPAD_DOWN" data-hold>▼</button>
  <button data-key="MEDIA_PLAY_PAUSE">⏯</button>
  <button data-key="VOLUME_DOWN" data-hold>V−</button>
  <button data-key="VOLUME_MUTE" data-tap-pair>🔇</button>
  <button data-key="VOLUME_UP" data-hold>V+</button>
</div>
<script>
const statusEl = document.getElementById('status');
const pairEl = document.getElementById('pair');
const msgEl = document.getElementById('pairmsg');
let pairing = false;

async function poll() {
  if (pairing) return;
  try {
    const s = await (await fetch('/api/status')).json();
    statusEl.textContent =
      `state: ${s.state} · paired: ${s.paired} · connected: ${s.connected}`;
    pairEl.classList.toggle('visible', s.state === 'wait_code');
    document.getElementById('keys').classList.toggle('visible', s.connected);
  } catch (e) {
    statusEl.textContent = 'esp32 unreachable';
  }
}

document.getElementById('send').onclick = async () => {
  const code = document.getElementById('code').value.trim().toUpperCase();
  if (!/^[0-9A-F]{6}$/.test(code)) {
    msgEl.textContent = 'code must be 6 hex characters';
    return;
  }
  pairing = true;
  msgEl.textContent = 'pairing…';
  try {
    const r = await (await fetch('/api/pair', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code}),
    })).json();
    msgEl.textContent = r.ok ? 'paired!' : (r.error || 'failed');
  } catch (e) {
    msgEl.textContent = 'request failed';
  }
  pairing = false;
  poll();
};

function sendKey(key, direction = 'SHORT') {
  return fetch('/api/key', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({key, direction}),
  }).catch(() => {});
}

document.querySelectorAll('#keys button').forEach(b => {
  const key = b.dataset.key;
  if (b.dataset.hold !== undefined) {
    // Press/release pair: quick tap acts like a click, holding repeats.
    let down = false;
    const release = () => { if (down) { down = false; sendKey(key, 'END_LONG'); } };
    b.addEventListener('pointerdown', e => {
      e.preventDefault(); down = true; sendKey(key, 'START_LONG');
    });
    b.addEventListener('pointerup', release);
    b.addEventListener('pointercancel', release);
    b.addEventListener('pointerleave', release);
    b.addEventListener('contextmenu', e => e.preventDefault());
  } else if (b.dataset.tapPair !== undefined) {
    // Keys the TV ignores as SHORT (volume group): send press+release.
    b.onclick = async () => { await sendKey(key, 'START_LONG'); sendKey(key, 'END_LONG'); };
  } else {
    b.onclick = () => sendKey(key);
  }
});

poll();
setInterval(poll, 2000);
</script>
</body>
</html>
