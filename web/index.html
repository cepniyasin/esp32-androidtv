<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101418">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TV Remote">
<title>TV Remote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    /* the whole remote is chrome, not content: nothing selectable, no
       long-press callouts anywhere (e.g. status text next to buttons) */
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #15191f 0%, #0c0f13 100%);
    color: #e8eaed;
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: center;
    padding: max(env(safe-area-inset-top), 12px) 16px
             max(env(safe-area-inset-bottom), 16px);
  }
  #remote {
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: 18px;
  }
  button {
    font: inherit; color: inherit; border: none; cursor: pointer;
    background: #232a33; border-radius: 14px;
    touch-action: manipulation;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, transform 0.06s;
  }
  button:active { background: #313b47; transform: scale(0.96); }
  button.nosupport { opacity: 0.3; pointer-events: none; }
  button svg {
    width: 22px; height: 22px; display: block; margin: 0 auto;
    fill: none; stroke: currentColor; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  button svg .fill { fill: currentColor; stroke: none; }

  /* top bar */
  #topbar { display: flex; align-items: center; justify-content: space-between; }
  #statusdot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #f28b82; display: inline-block; margin-right: 8px;
    transition: background 0.3s;
  }
  #statusdot.on { background: #81c995; }
  #statusline { font-size: 0.8rem; color: #9aa0a6; display: flex; align-items: center; }
  #power {
    width: 52px; height: 52px; border-radius: 50%;
    color: #f28b82; background: #2a2229;
    display: flex; align-items: center; justify-content: center;
  }
  #power:active { background: #3d2e35; }

  /* d-pad */
  #dpad {
    position: relative; width: 240px; height: 240px;
    margin: 0 auto; border-radius: 50%; background: #1b2129;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  #dpad button {
    position: absolute; background: transparent; border-radius: 0;
    color: #bdc1c6; display: flex; align-items: center; justify-content: center;
  }
  #dpad button:active { background: rgba(255,255,255,0.07); transform: none; }
  #dpad button svg { width: 26px; height: 26px; stroke-width: 2.2; }
  #d-up    { top: 0;    left: 25%; width: 50%; height: 33%; }
  #d-down  { bottom: 0; left: 25%; width: 50%; height: 33%; }
  #d-left  { left: 0;   top: 25%;  width: 33%; height: 50%; }
  #d-right { right: 0;  top: 25%;  width: 33%; height: 50%; }
  #d-ok {
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 96px; height: 96px; border-radius: 50%;
    background: #2c3540; font-weight: 600; letter-spacing: 0.06em;
    box-shadow: 0 2px 8px rgba(0,0,0,0.45);
  }
  #d-ok:active { background: #3a4652; transform: translate(-50%, -50%) scale(0.96); }

  /* rows */
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .row button {
    height: 56px; color: #bdc1c6;
    display: flex; align-items: center; justify-content: center;
  }

  /* app shortcuts */
  #apps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  #apps button { height: 52px; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.02em; }
  #app-netflix { background: #2a1a1c; color: #e50914; }
  #app-netflix:active { background: #3c2225; }
  #app-youtube { background: #2a1e1c; color: #ff4e45; }
  #app-youtube:active { background: #3c2a26; }

  /* pairing */
  #pair {
    display: none; flex-direction: column; align-items: center; gap: 10px;
    background: #1b2129; border-radius: 16px; padding: 18px;
  }
  #pair.visible { display: flex; }
  #pair p { font-size: 0.9rem; color: #9aa0a6; }
  #code {
    user-select: text; -webkit-user-select: text;  /* input stays editable */
    font: inherit; font-size: 1.4rem; width: 9ch; text-align: center;
    text-transform: uppercase; letter-spacing: 0.25ch;
    background: #10151b; color: #e8eaed;
    border: 1px solid #333b45; border-radius: 10px; padding: 8px;
  }
  #pair button { padding: 10px 26px; background: #8ab4f8; color: #10151b; font-weight: 600; }
  #pairmsg { font-size: 0.85rem; min-height: 1.1em; color: #9aa0a6; }
</style>
</head>
<body>
<div id="remote">
  <div id="topbar">
    <span id="statusline"><span id="statusdot"></span><span id="statustext">connecting…</span></span>
    <button id="power" data-key="POWER" aria-label="Power">
      <svg viewBox="0 0 24 24"><path d="M12 3v8"/><path d="M17.66 6.34a8 8 0 1 1-11.32 0"/></svg>
    </button>
  </div>

  <div id="pair">
    <p>Enter the code shown on the TV</p>
    <input id="code" maxlength="6" autocomplete="off" spellcheck="false" placeholder="A1B2C3">
    <button id="send">Pair</button>
    <p id="pairmsg"></p>
  </div>

  <div id="dpad">
    <button id="d-up" data-key="DPAD_UP" data-hold aria-label="Up">
      <svg viewBox="0 0 24 24"><polyline points="6 14 12 8 18 14"/></svg>
    </button>
    <button id="d-left" data-key="DPAD_LEFT" data-hold aria-label="Left">
      <svg viewBox="0 0 24 24"><polyline points="14 6 8 12 14 18"/></svg>
    </button>
    <button id="d-ok" data-key="DPAD_CENTER" aria-label="OK">OK</button>
    <button id="d-right" data-key="DPAD_RIGHT" data-hold aria-label="Right">
      <svg viewBox="0 0 24 24"><polyline points="10 6 16 12 10 18"/></svg>
    </button>
    <button id="d-down" data-key="DPAD_DOWN" data-hold aria-label="Down">
      <svg viewBox="0 0 24 24"><polyline points="6 10 12 16 18 10"/></svg>
    </button>
  </div>

  <div class="row">
    <button data-key="BACK" aria-label="Back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="11 6 5 12 11 18"/></svg>
    </button>
    <button data-key="HOME" aria-label="Home">
      <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/></svg>
    </button>
    <button data-key="MEDIA_PLAY_PAUSE" aria-label="Play/Pause">
      <svg viewBox="0 0 24 24"><path class="fill" d="M5 5.5v13l9-6.5z"/><path d="M17.5 5.5v13"/><path d="M21 5.5v13"/></svg>
    </button>
  </div>

  <div class="row">
    <button data-key="VOLUME_DOWN" data-hold data-vol aria-label="Volume down">
      <svg viewBox="0 0 24 24"><path d="M6 12h12"/></svg>
    </button>
    <button data-key="VOLUME_MUTE" data-vol aria-label="Mute">
      <svg viewBox="0 0 24 24"><path class="fill" d="M4 9v6h4l5 4V5L8 9z"/><path d="m16.5 9.5 5 5"/><path d="m21.5 9.5-5 5"/></svg>
    </button>
    <button data-key="VOLUME_UP" data-hold data-vol aria-label="Volume up">
      <svg viewBox="0 0 24 24"><path d="M6 12h12"/><path d="M12 6v12"/></svg>
    </button>
  </div>

  <div id="apps">
    <button id="app-netflix" data-link="netflix://home">NETFLIX</button>
    <button id="app-youtube" data-link="https://www.youtube.com/tv">YouTube</button>
  </div>
</div>

<script>
const statusText = document.getElementById('statustext');
const statusDot = document.getElementById('statusdot');
const pairEl = document.getElementById('pair');
const msgEl = document.getElementById('pairmsg');
let pairing = false;
let holding = false;

// All key sends go through one promise chain: parallel fetches can arrive
// out of order, and a release overtaking its press breaks the key.
let keyChain = Promise.resolve();
function post(url, body) {
  keyChain = keyChain
    .then(() => fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    }))
    .catch(() => {});
  return keyChain;
}
const sendKey = (key, direction = 'SHORT') => post('/api/key', {key, direction});

// A press shorter than this is a tap (single SHORT). Only a real hold
// sends the START_LONG/END_LONG pair — rapid long-press pairs make the
// Chromecast close the control connection.
const HOLD_THRESHOLD_MS = 300;

async function poll() {
  if (pairing || holding) return;
  try {
    const s = await (await fetch('/api/status')).json();
    statusDot.classList.toggle('on', s.connected);
    statusText.textContent = s.connected ? 'connected'
      : s.state === 'wait_code' ? 'pairing'
      : s.state.replace('_', ' ');
    pairEl.classList.toggle('visible', s.state === 'wait_code');
    // max == 0: the device delegates volume to the TV over CEC; the
    // protocol cannot change it.
    const volOk = s.volume && s.volume.max > 0;
    document.querySelectorAll('[data-vol]').forEach(v => {
      v.classList.toggle('nosupport', !volOk);
    });
  } catch (e) {
    statusDot.classList.remove('on');
    statusText.textContent = 'unreachable';
  }
}

document.querySelectorAll('[data-key]').forEach(b => {
  const key = b.dataset.key;
  if (b.dataset.hold !== undefined) {
    let down = false;
    let longActive = false;
    let holdTimer = null;
    const release = () => {
      if (!down) return;
      down = false;
      holding = false;
      clearTimeout(holdTimer);
      if (longActive) {
        longActive = false;
        sendKey(key, 'END_LONG');
      } else {
        sendKey(key, 'SHORT');
      }
    };
    b.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (down) return;
      b.setPointerCapture(e.pointerId);
      down = true;
      holding = true;
      holdTimer = setTimeout(() => {
        longActive = true;
        sendKey(key, 'START_LONG');
      }, HOLD_THRESHOLD_MS);
    });
    b.addEventListener('pointerup', release);
    b.addEventListener('pointercancel', release);
    b.addEventListener('contextmenu', e => e.preventDefault());
  } else {
    b.onclick = () => sendKey(key);
  }
});

document.querySelectorAll('[data-link]').forEach(b => {
  b.onclick = () => post('/api/app', {link: b.dataset.link});
});

document.getElementById('send').onclick = async () => {
  const code = document.getElementById('code').value.trim().toUpperCase();
  if (!/^[0-9A-F]{6}$/.test(code)) {
    msgEl.textContent = 'code must be 6 hex characters';
    return;
  }
  pairing = true;
  msgEl.textContent = 'pairing…';
  try {
    const r = await (await fetch('/api/pair', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code}),
    })).json();
    msgEl.textContent = r.ok ? 'paired!' : (r.error || 'failed');
  } catch (e) {
    msgEl.textContent = 'request failed';
  }
  pairing = false;
  poll();
};

poll();
setInterval(poll, 2500);
</script>
</body>
</html>
