[platformio]
src_dir = main

[env:esp32doit-devkit-v1]
platform = espressif32
framework = espidf
board = esp32doit-devkit-v1
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = partitions.csv
board_build.embed_txtfiles =
    certs/client.pem
    certs/client.key
    web/index.html
board_build.embed_files =
    web/icon-192.png
    web/icon-512.png
    web/apple-touch-icon.png
